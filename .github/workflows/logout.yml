name: HR Logout

on:
  schedule:
    # 🕒 12:40 PM IST (07:10 UTC) — arrives before 1:00 PM
    - cron: "10 7 * * 1-6"

    # 🕒 6:30 PM IST (13:00 UTC) — arrives before 6:55 PM
    - cron: "00 13 * * 1-6"

  workflow_dispatch:

jobs:
  logout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run Logout Bot
        run: python hr_bot.py
        env:
          HR_USERNAME: ${{ secrets.HR_USERNAME }}
          HR_PASSWORD: ${{ secrets.HR_PASSWORD }}
          ACTION: "logout"

      - name: Commit updated hours
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add hours.json
          git commit -m "update hours" || echo "No changes"
          git push
      # 👇 ADD THIS AT END
      - name: Commit updated hours
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add hours.json
          git commit -m "update hours" || echo "No changes"
          git push
